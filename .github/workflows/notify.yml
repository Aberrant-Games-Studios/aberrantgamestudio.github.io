name: Notify Discord on News Update

on:
  push:
    branches: [main]
    paths:
      - 'news.json'

jobs:
  discord-notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read latest post and fire Discord webhook
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python3 - <<'PYEOF'
          import json, os, urllib.parse, urllib.request

          with open('news.json') as f:
            posts = json.load(f)

          posts.sort(key=lambda p: p['date'], reverse=True)
          p = posts[0]

          tag   = p.get('tag', 'Update')
          date  = p['date']
          title = p['title']
          blurb = p['blurb']
          pid   = p['id']
          image = p.get('image', '')

          site_url = "https://www.aberrantgamestudio.com"
          post_url = f"{site_url}/news.html#{pid}"

          color = 7829503
          if 'Announce' in tag: color = 14680064
          if 'Dev Log'  in tag: color = 2829617

          embed = {
            'color': color,
            'author': {'name': f'{tag}  ·  {date}'},
            'title': title,
            'description': blurb,
            'url': post_url,
            'footer': {'text': 'aberrantgamestudio.com'}
          }

          if image:
            normalized_image = urllib.parse.urljoin(f"{site_url}/", image.lstrip('/'))
            parsed = urllib.parse.urlsplit(normalized_image)
            cache_bust = urllib.parse.urlencode({'v': f'{date}-{pid}'})
            image_url = urllib.parse.urlunsplit((
              parsed.scheme,
              parsed.netloc,
              urllib.parse.quote(parsed.path),
              cache_bust,
              parsed.fragment
            ))
            embed['image'] = {'url': image_url}

          payload = json.dumps({
            'username': 'ORDER // ONE',
            'avatar_url': f'{site_url}/images/circle.png',
            'embeds': [embed]
          }).encode()

          webhook = os.environ['DISCORD_WEBHOOK']
          
          # Added User-Agent to bypass Discord/Cloudflare blocking
          headers = {
              'Content-Type': 'application/json',
              'User-Agent': 'AberrantGamesWebhook/1.0'
          }
          
          req = urllib.request.Request(webhook, data=payload, headers=headers)
          with urllib.request.urlopen(req) as res:
            print(f"Discord responded: {res.status}")
          PYEOF
